stages:
  - build
  - push

variables:
  IMAGE_NAME: "ourwebsite"
  DOCKERFILE_PATH: "Dockerfile"
  DOCKER_CONTEXT: "."
  DOCKER_TLS_CERTDIR: ""

default:
  image: docker:27
  services:
    - name: docker:27-dind

build_image:
  stage: build
  script:
    - docker build -f "$DOCKERFILE_PATH" -t "$IMAGE_NAME:$CI_COMMIT_SHORT_SHA" "$DOCKER_CONTEXT"
    - docker save "$IMAGE_NAME:$CI_COMMIT_SHORT_SHA" -o image.tar
  artifacts:
    paths:
      - image.tar
    expire_in: 1 day
  rules:
    - if: '$CI_COMMIT_BRANCH'

push_image:
  stage: push
  dependencies:
    - build_image
  before_script:
    - apk add --no-cache curl jq
  script:
    - docker load -i image.tar
    # Debug Vault connectivity
    - echo "VAULT_ADDR=$VAULT_ADDR"
    - curl -vk "$VAULT_ADDR/v1/sys/health" -o /dev/null -w "\nhealth_http=%{http_code}\n" || true
    - curl -vk -X POST "$VAULT_ADDR/v1/auth/approle/login" -d '{"role_id":"test","secret_id":"test"}' -o /dev/null -w "\nlogin_http=%{http_code}\n" || true

    # Vault AppRole login -> VAULT_TOKEN (real)
    - >
      VAULT_TOKEN=$(curl -s --request POST
      --data "{\"role_id\":\"$VAULT_ROLE_ID\",\"secret_id\":\"$VAULT_SECRET_ID\"}"
      "$VAULT_ADDR/v1/auth/approle/login" | jq -r .auth.client_token)

    - echo "VAULT_TOKEN_EMPTY?=$( [ -z "$VAULT_TOKEN" ] && echo yes || echo no )"
