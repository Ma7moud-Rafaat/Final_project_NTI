stages: [cd]

variables:
  DEPLOY_FILE: "k8s/deployment.yml"
  IMAGE_REPO: "ma7moudrafaat/ourwebsite"

cd_update_manifest:
  stage: cd
  image: alpine:3.19

  before_script:
    - set -euo pipefail
    - apk add --no-cache git curl jq yq
    - git config --global user.email "ci@gitlab"
    - git config --global user.name "gitlab-ci"

  script:
    # 1) Vault AppRole login -> VAULT_TOKEN
    - |
      LOGIN_JSON="$(curl -sS --fail --request POST \
        --data "{\"role_id\":\"$VAULT_ROLE_ID\",\"secret_id\":\"$VAULT_SECRET_ID\"}" \
        "$VAULT_ADDR/v1/auth/approle/login")"

      VAULT_TOKEN="$(echo "$LOGIN_JSON" | jq -r .auth.client_token)"
      test -n "$VAULT_TOKEN" && [ "$VAULT_TOKEN" != "null" ]

    # 2) Read GitLab token from Vault KV v2
    - |
      GITLAB_JSON="$(curl -sS --fail \
        -H "X-Vault-Token: $VAULT_TOKEN" \
        "$VAULT_ADDR/v1/secret/data/gitlab")"

      GITLAB_TOKEN="$(echo "$GITLAB_JSON" | jq -r .data.data.token)"
      test -n "$GITLAB_TOKEN" && [ "$GITLAB_TOKEN" != "null" ]

    # 3) Update manifest image tag
    - |
      TAG="${IMAGE_TAG:-$CI_COMMIT_SHORT_SHA}"
      echo "Deploying ${IMAGE_REPO}:${TAG}"

      yq -i '.spec.template.spec.containers[0].image = strenv(IMAGE_REPO) + ":" + strenv(TAG)' "$DEPLOY_FILE"

      git add "$DEPLOY_FILE"
      git commit -m "cd: deploy ${IMAGE_REPO}:${TAG} [skip ci]" || echo "No changes"

      git push "https://oauth2:${GITLAB_TOKEN}@gitlab.com/${CI_PROJECT_PATH}.git" HEAD:main

  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
