workflow:
  rules:
    - when: always

stages:
  - read_outputs
  - bootstrap
  - deploy
  - ingress
  - validate
  - destroy

default:
  tags:
    - local

variables:
  KUBECONFIG: /tmp/kubeconfig
  TF_ROOT: "root_modules"
  DOMAIN_BASE: "internal.local"

  INGRESS_NS: "ingress-nginx"
  INGRESS_SVC: "ingress-nginx-controller"

# ---------------------------
# Common tools (kubectl/helm/aws)
# ---------------------------
.k8s_tools:
  image: alpine:3.19
  before_script:
    - set -euo pipefail
    - apk add --no-cache bash curl jq git openssl aws-cli kubectl helm gettext
    - aws --version
    - kubectl version --client=true
    - helm version

# ---------------------------
# 1) Read Terraform Outputs (manual)
# ---------------------------
read_outputs:
  stage: read_outputs
  image:
    name: hashicorp/terraform:1.7.5
    entrypoint: [""]
  when: manual
  allow_failure: false
  script:
    - apk add --no-cache bash
    - bash scripts/read-outputs.sh
  artifacts:
    reports:
      dotenv: outputs.env

# ---------------------------
# 2) Bootstrap controllers only (manual)
# ---------------------------
bootstrap:
  stage: bootstrap
  extends: .k8s_tools
  when: manual
  allow_failure: false
  needs:
    - job: read_outputs
      artifacts: true
  script:
    - bash scripts/bootstrap.sh

# ---------------------------
# 3) Deploy apps (manual)
# ---------------------------
deploy:
  stage: deploy
  extends: .k8s_tools
  when: manual
  allow_failure: false
  needs:
    - job: bootstrap
      artifacts: true
  script:
    - bash scripts/deploy-apps.sh

# ---------------------------
# 4) Ingress rules + TargetGroupBinding (manual)
# ---------------------------
ingress:
  stage: ingress
  extends: .k8s_tools
  when: manual
  allow_failure: false
  needs:
    - job: deploy
      artifacts: true
  script:
    - bash scripts/ingress.sh

# ---------------------------
# 5) Validate (manual)
# ---------------------------
validate:
  stage: validate
  extends: .k8s_tools
  when: manual
  allow_failure: false
  needs:
    - job: ingress
      artifacts: true
  script:
    - bash scripts/validate.sh

# ---------------------------
# 6) Destroy (manual)
# ---------------------------
destroy:
  stage: destroy
  extends: .k8s_tools
  when: manual
  allow_failure: false
  needs:
    - job: read_outputs
      artifacts: true
  script:
    - bash scripts/destroy.sh
