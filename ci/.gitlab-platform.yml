workflow:
  rules:
    - when: always

stages:
  - read_outputs
  - bootstrap
  - deploy
  - ingress
  - validate
  - destroy

default:
  tags:
    - local

variables:
  KUBECONFIG: /tmp/kubeconfig
  TF_ROOT: "root_modules"
  DOMAIN_BASE: "internal.local"

  INGRESS_NS: "ingress-nginx"
  INGRESS_SVC: "ingress-nginx-controller"

# ---------------------------
# 1) Read Terraform Outputs
# ---------------------------
read_outputs:
  stage: read_outputs
  image:
    name: hashicorp/terraform:1.7.5
    entrypoint: [""]
  script: |
    set -euo pipefail
    cd "$TF_ROOT"

    terraform init -reconfigure -input=false \
      -backend-config="bucket=${TF_STATE_BUCKET}" \
      -backend-config="key=${TF_STATE_KEY}" \
      -backend-config="region=${AWS_REGION}"

    AWS_REGION_OUT="$(terraform output -raw region 2>/dev/null || echo "${AWS_REGION}")"
    EKS_CLUSTER_NAME="$(terraform output -raw eks_cluster_name 2>/dev/null || true)"
    NLB_TG_ARN="$(terraform output -raw ingress_nlb_target_group_arn 2>/dev/null || true)"
    AWS_LBC_ROLE_ARN="$(terraform output -raw aws_lbc_role_arn 2>/dev/null || true)"

    # Guards
    test -n "${EKS_CLUSTER_NAME}" || (echo "ERROR: eks_cluster_name output is empty" && exit 1)
    test -n "${NLB_TG_ARN}" || (echo "ERROR: ingress_nlb_target_group_arn output is empty" && exit 1)
    test -n "${AWS_LBC_ROLE_ARN}" || (echo "ERROR: aws_lbc_role_arn output is empty" && exit 1)

    printf "AWS_REGION=%s\nEKS_CLUSTER_NAME=%s\nNLB_TG_ARN=%s\nAWS_LBC_ROLE_ARN=%s\n" \
      "$AWS_REGION_OUT" "$EKS_CLUSTER_NAME" "$NLB_TG_ARN" "$AWS_LBC_ROLE_ARN" \
      > "$CI_PROJECT_DIR/outputs.env"

    cat "$CI_PROJECT_DIR/outputs.env"
  artifacts:
    reports:
      dotenv: outputs.env

# ---------------------------
# Common tools (kubectl/helm/aws)
# ---------------------------
.k8s_tools:
  image: alpine:3.19
  before_script: |
    set -euo pipefail
    apk add --no-cache bash curl jq git openssl aws-cli kubectl helm gettext
    aws --version
    kubectl version --client=true
    helm version
    aws eks update-kubeconfig --region "$AWS_REGION" --name "$EKS_CLUSTER_NAME" --kubeconfig "$KUBECONFIG"
    kubectl get ns >/dev/null

# ---------------------------
# 2) Bootstrap controllers only
# ---------------------------
bootstrap:
  stage: bootstrap
  extends: .k8s_tools
  script: |
    set -euo pipefail

    # AWS Load Balancer Controller
    helm repo add eks https://aws.github.io/eks-charts
    helm repo update

    kubectl -n kube-system get sa aws-load-balancer-controller >/dev/null 2>&1 || \
      kubectl -n kube-system create sa aws-load-balancer-controller

    kubectl -n kube-system annotate sa aws-load-balancer-controller \
      eks.amazonaws.com/role-arn="$AWS_LBC_ROLE_ARN" --overwrite

    helm upgrade --install aws-load-balancer-controller eks/aws-load-balancer-controller \
      -n kube-system \
      --set clusterName="$EKS_CLUSTER_NAME" \
      --set serviceAccount.create=false \
      --set serviceAccount.name=aws-load-balancer-controller

    kubectl -n kube-system rollout status deploy/aws-load-balancer-controller --timeout=600s

    # ingress-nginx controller (ClusterIP)
    kubectl create namespace "$INGRESS_NS" --dry-run=client -o yaml | kubectl apply -f -

    helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
    helm repo update

    helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx \
      -n "$INGRESS_NS" \
      --set controller.service.type=ClusterIP

    kubectl -n "$INGRESS_NS" rollout status deploy/ingress-nginx-controller --timeout=600s
    kubectl -n "$INGRESS_NS" get svc "$INGRESS_SVC" -o wide

# ---------------------------
# 3) Deploy apps
# ---------------------------
deploy:
  stage: deploy
  extends: .k8s_tools
  needs: ["bootstrap"]
  script: |
    set -euo pipefail

    # ArgoCD
    kubectl create namespace argocd --dry-run=client -o yaml | kubectl apply -f -
    helm repo add argo https://argoproj.github.io/argo-helm
    helm repo update
    helm upgrade --install argocd argo/argo-cd -n argocd
    kubectl -n argocd rollout status deploy/argocd-server --timeout=600s || true

    # Vault (dev)
    kubectl create namespace vault --dry-run=client -o yaml | kubectl apply -f -
    helm repo add hashicorp https://helm.releases.hashicorp.com
    helm repo update
    helm upgrade --install vault hashicorp/vault -n vault --set server.dev.enabled=true
    kubectl -n vault get pods

    # Nexus
    kubectl create namespace nexus --dry-run=client -o yaml | kubectl apply -f -
    helm repo add sonatype https://sonatype.github.io/helm3-charts/
    helm repo update
    helm upgrade --install nexus sonatype/nexus-repository-manager -n nexus
    kubectl -n nexus get pods

# ---------------------------
# 4) Ingress rules + TargetGroupBinding
# ---------------------------
ingress:
  stage: ingress
  extends: .k8s_tools
  needs: ["deploy"]
  script: |
    set -euo pipefail
    : "${DOMAIN_BASE:?DOMAIN_BASE is required}"

    # TargetGroupBinding (ip) -> ingress-nginx-controller:80
    cat > /tmp/ingress-nginx-tgb.yaml <<'EOF'
    apiVersion: elbv2.k8s.aws/v1beta1
    kind: TargetGroupBinding
    metadata:
      name: ingress-nginx-tgb
      namespace: ${INGRESS_NS}
    spec:
      serviceRef:
        name: ${INGRESS_SVC}
        port: 80
      targetGroupARN: ${NLB_TG_ARN}
      targetType: ip
    EOF
    envsubst < /tmp/ingress-nginx-tgb.yaml | kubectl apply -f -
    kubectl -n "$INGRESS_NS" get targetgroupbinding ingress-nginx-tgb

    # ArgoCD ingress
    cat > /tmp/argocd-ing.yaml <<EOF
    apiVersion: networking.k8s.io/v1
    kind: Ingress
    metadata:
      name: argocd-ing
      namespace: argocd
    spec:
      ingressClassName: nginx
      rules:
      - host: argocd.${DOMAIN_BASE}
        http:
          paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                port:
                  number: 80
    EOF

    # Vault ingress
    cat > /tmp/vault-ing.yaml <<EOF
    apiVersion: networking.k8s.io/v1
    kind: Ingress
    metadata:
      name: vault-ing
      namespace: vault
    spec:
      ingressClassName: nginx
      rules:
      - host: vault.${DOMAIN_BASE}
        http:
          paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vault
                port:
                  number: 8200
    EOF

    # Nexus ingress
    cat > /tmp/nexus-ing.yaml <<EOF
    apiVersion: networking.k8s.io/v1
    kind: Ingress
    metadata:
      name: nexus-ing
      namespace: nexus
    spec:
      ingressClassName: nginx
      rules:
      - host: nexus.${DOMAIN_BASE}
        http:
          paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nexus-nexus-repository-manager
                port:
                  number: 8081
    EOF

    kubectl apply -f /tmp/argocd-ing.yaml
    kubectl apply -f /tmp/vault-ing.yaml
    kubectl apply -f /tmp/nexus-ing.yaml

    kubectl get ingress -A -o wide

# ---------------------------
# 5) Validate
# ---------------------------
validate:
  stage: validate
  extends: .k8s_tools
  needs: ["ingress"]
  script: |
    set -euo pipefail
    echo "== ingress-nginx svc/pods =="
    kubectl -n "$INGRESS_NS" get svc,pods -o wide

    echo "== TargetGroupBinding =="
    kubectl -n "$INGRESS_NS" describe targetgroupbinding ingress-nginx-tgb | sed -n '1,220p'

    echo "== ingresses =="
    kubectl get ingress -A -o wide

    echo "== apps pods =="
    kubectl -n argocd get pods
    kubectl -n vault get pods
    kubectl -n nexus get pods

# ---------------------------
# 6) Destroy (manual)
# ---------------------------
destroy:
  stage: destroy
  extends: .k8s_tools
  when: manual
  script: |
    set -euo pipefail
    helm -n argocd uninstall argocd || true
    helm -n vault uninstall vault || true
    helm -n nexus uninstall nexus || true
    helm -n ingress-nginx uninstall ingress-nginx || true
    helm -n kube-system uninstall aws-load-balancer-controller || true
    kubectl -n ingress-nginx delete targetgroupbinding ingress-nginx-tgb --ignore-not-found=true || true
    kubectl delete ns argocd vault nexus ingress-nginx --ignore-not-found=true
