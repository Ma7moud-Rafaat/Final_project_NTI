workflow:
  rules:
    - when: always

stages:
  - lint
  - validate
  - plan
  - apply
  - destroy

default:
  tags:
    - local
  image:
    name: hashicorp/terraform:1.7.5
    entrypoint: [""]
  before_script:
    - terraform --version

variables:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  TF_ROOT: "root_modules"


fmt:
  stage: lint
  script:
    - cd "${TF_ROOT}"
    - terraform fmt -recursive

validate:
  stage: validate
  script:
    - cd "${TF_ROOT}"
    - terraform init -backend=false
    - terraform validate

plan:
  stage: plan
  script:
    - cd "${TF_ROOT}"
    - terraform init -reconfigure -input=false -backend-config="bucket=${TF_STATE_BUCKET}" -backend-config="key=${TF_STATE_KEY}" -backend-config="region=${AWS_REGION}"
    - terraform plan -out=tfplan
  artifacts:
    name: "tfplan-${CI_COMMIT_SHORT_SHA}"
    paths:
      - ${TF_ROOT}/tfplan
      - ${TF_ROOT}/.terraform.lock.hcl
    expire_in: 1 day

apply:
  stage: apply
  when: manual
  script:
    - cd "${TF_ROOT}"
    - terraform init -reconfigure -input=false -backend-config="bucket=${TF_STATE_BUCKET}" -backend-config="key=${TF_STATE_KEY}" -backend-config="region=${AWS_REGION}"
    - terraform plan -out=tfplan -input=false
    - terraform apply -auto-approve -input=false tfplan
    - terraform output
    - terraform output -json > infra_outputs.json
  artifacts:
    paths:
      - "${TF_ROOT}/infra_outputs.json"
    expire_in: 7 days



destroy:
  stage: destroy
  when: manual
  image:
    name: hashicorp/terraform:1.7.5
    entrypoint: [""]
  script:
    - cd "${TF_ROOT}"
    - terraform init -reconfigure -input=false -backend-config="bucket=${TF_STATE_BUCKET}" -backend-config="key=${TF_STATE_KEY}" -backend-config="region=${AWS_REGION}"
    - terraform destroy -auto-approve

