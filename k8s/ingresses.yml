apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nlp-web-ing
  namespace: nlp
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  rules:
    - host: HOST_NAME
      http:
        paths:
          - path: /nlp(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: nlp-web-svc
                port:
                  number: 80
