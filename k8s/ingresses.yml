apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nlp-web
  namespace: myapp
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  rules:
    - host: 1bz5gyxttc.execute-api.us-east-1.amazonaws.com
      http:
        paths:
          - path: /nlp(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: nlp-web
                port:
                  number: 80
