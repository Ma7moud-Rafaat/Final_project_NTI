apiVersion: apps/v1
kind: Deployment
metadata:
  name: nlp-web
  namespace: myapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nlp-web
  template:
    metadata:
      labels:
        app: nlp-web
    spec:
      containers:
        - name: nlp-web
          image: ma7moudrafaat/ourwebsite:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 20
            periodSeconds: 20
